<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>QA-Swarm Backoffice</title>
<style>
  :root { --bg: #0f172a; --surface: #1e293b; --border: #334155; --text: #e2e8f0; --muted: #94a3b8; --accent: #7c3aed; --green: #22c55e; --red: #ef4444; --yellow: #eab308; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
  .container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0.75rem 1.5rem; display: flex; gap: 2rem; align-items: center; }
  nav a { color: var(--muted); text-decoration: none; font-size: 0.9rem; } nav a:hover { color: var(--text); }
  nav .brand { color: var(--accent); font-weight: 700; font-size: 1.1rem; }
  h1 { font-size: 1.5rem; margin-bottom: 1rem; } h2 { font-size: 1.15rem; margin: 1.5rem 0 0.75rem; }
  table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
  th, td { padding: 0.5rem 0.75rem; text-align: left; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
  th { color: var(--muted); font-weight: 600; }
  .badge { padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: 600; }
  .badge-pass { background: #166534; color: var(--green); }
  .badge-fail { background: #7f1d1d; color: var(--red); }
  .btn { display: inline-block; padding: 0.5rem 1rem; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; text-decoration: none; }
  .btn-primary { background: var(--accent); color: #fff; } .btn-primary:hover { opacity: 0.9; }
  .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }
  input, select { background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 0.45rem 0.75rem; font-size: 0.85rem; }
  pre { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; overflow-x: auto; font-size: 0.82rem; white-space: pre-wrap; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1rem; }
  form.inline { display: flex; gap: 0.75rem; align-items: end; flex-wrap: wrap; }
  form.inline label { font-size: 0.8rem; color: var(--muted); display: flex; flex-direction: column; gap: 0.25rem; }
</style>
</head>
<body>
<nav>
  <a class="brand" href="/">QA-Swarm</a>
  <a href="/">Runs</a>
  <a href="/scenarios">Scenarios</a>
  <a href="/regression">Regression</a>
</nav>
<div class="container">
{% block content %}{% endblock %}
</div>
</body>
</html>
